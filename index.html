<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CAPTAIN ENTERPRISE V.11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #007AFF; }
        body { background: #000; color: #fff; font-family: 'Anuphan', sans-serif; overflow: hidden; }
        .glass { background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
        .card-stat { background: linear-gradient(145deg, #111, #050505); border: 1px solid rgba(255,255,255,0.03); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex h-screen">

    <nav class="w-72 glass p-8 flex flex-col border-r border-white/5">
        <div class="mb-12"><h1 class="text-3xl font-black italic text-blue-500">SYSTEM<span class="text-white">X</span></h1></div>
        
        <div class="space-y-3 flex-grow">
            <button onclick="nav('dash')" class="tab-btn active w-full flex items-center gap-4 p-4 rounded-2xl border border-white/5 text-sm font-bold transition">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </button>
            <button onclick="nav('pos')" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl border border-white/5 text-sm font-bold transition">
                <i class="fa-solid fa-square-poll-vertical"></i> ระบบหน้าร้าน (POS)
            </button>
            <button onclick="nav('inv')" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl border border-white/5 text-sm font-bold transition">
                <i class="fa-solid fa-boxes-stacked"></i> จัดการสต็อก (9 หมวด)
            </button>
            <button onclick="nav('sett')" class="tab-btn w-full flex items-center gap-4 p-4 rounded-2xl border border-white/5 text-sm font-bold transition">
                <i class="fa-solid fa-gears"></i> ตั้งค่าระบบจ่ายเงิน
            </button>
        </div>

        <div class="mt-auto p-4 glass rounded-2xl border-blue-500/20 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase">Status: Connected</p>
            <p class="text-xs text-blue-500 font-bold">Database Alpha-1</p>
        </div>
    </nav>

    <main class="flex-grow p-12 overflow-y-auto">
        
        <div id="dash" class="page active">
            <div class="flex justify-between items-end mb-12">
                <div><p class="text-blue-500 font-bold text-xs uppercase tracking-widest mb-2">Business Overview</p>
                <h2 class="text-5xl font-black italic">CONTROL PANEL</h2></div>
                <div class="text-right"><p class="text-3xl font-black text-white">฿1,240,500</p><p class="text-[10px] text-green-500 font-bold uppercase">Total Revenue +12%</p></div>
            </div>

            <div class="grid grid-cols-3 gap-8 mb-12">
                <div class="card-stat p-8 rounded-[40px]">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-4">Orders Today</p>
                    <h3 class="text-4xl font-black italic">142 <span class="text-sm text-blue-500 italic">Orders</span></h3>
                </div>
                <div class="card-stat p-8 rounded-[40px]">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-4">New Members</p>
                    <h3 class="text-4xl font-black italic">28 <span class="text-sm text-blue-500 italic">Users</span></h3>
                </div>
                <div class="card-stat p-8 rounded-[40px]">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-4">Stock Value</p>
                    <h3 class="text-4xl font-black italic">฿4.2M</h3>
                </div>
            </div>

            <div class="glass p-8 rounded-[40px]">
                <h4 class="font-bold mb-6 uppercase text-sm italic tracking-widest">Recent Activity</h4>
                <div class="space-y-4" id="log-list">
                    </div>
            </div>
        </div>

        <div id="pos" class="page">
            <h2 class="text-4xl font-black italic mb-8">POINT OF SALE</h2>
            <div class="grid grid-cols-4 gap-6" id="pos-grid"></div>
        </div>

    </main>

    <script>
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        const logs = [
            { t: '16:40', m: 'New Order #9904 (฿4,500)', s: 'Success' },
            { t: '16:35', m: 'Stock Update: Aero Shoes (+50)', s: 'Update' },
            { t: '16:30', m: 'Payment Gateway Synchronized', s: 'System' }
        ];

        document.getElementById('log-list').innerHTML = logs.map(l => `
            <div class="flex justify-between items-center py-4 border-b border-white/5">
                <div class="flex gap-4">
                    <span class="text-gray-600 font-mono text-xs">${l.t}</span>
                    <p class="text-xs font-bold uppercase">${l.m}</p>
                </div>
                <span class="text-[9px] font-bold px-3 py-1 rounded-full bg-blue-500/10 text-blue-500">${l.s}</span>
            </div>
        `).join('');

        const items = [
            { n: 'Vortex Tee', p: 990, img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400' },
            { n: 'Cyber Boot', p: 4200, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
            { n: 'Neon Hat', p: 1200, img: 'https://images.unsplash.com/photo-1588850567047-1845a9ee0280?w=400' },
            { n: 'Sling Bag', p: 1500, img: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400' }
        ];

        document.getElementById('pos-grid').innerHTML = items.map(i => `
            <div class="glass p-4 rounded-3xl text-center">
                <img src="${i.img}" class="rounded-2xl mb-4 aspect-square object-cover">
                <h4 class="text-[10px] font-bold uppercase truncate">${i.n}</h4>
                <p class="text-blue-500 font-black italic">฿${i.p.toLocaleString()}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
