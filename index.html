<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN SOVEREIGN | The Future of Retail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #007AFF; --bg: #050505; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        
        /* Premium Glass Effects */
        .glass-blur { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-premium { background: linear-gradient(135deg, #007AFF, #00c6ff); transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4); }
        .btn-premium:active { transform: scale(0.95); }

        /* Smooth Product Cards */
        .product-card { transition: 0.5s; cursor: pointer; }
        .product-card:hover img { transform: scale(1.15); }
        .badge-low { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* Toast UI */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); opacity: 0; transition: 0.5s; z-index: 1000; }
        #toast.active { transform: translate(-50%, 0); opacity: 1; }
    </style>
</head>
<body>

    <div id="toast" class="glass-blur px-8 py-4 rounded-full flex items-center gap-4 border border-blue-500/30 shadow-2xl">
        <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
        <p class="text-xs font-bold tracking-widest uppercase italic">Added to Archive Successfully</p>
    </div>

    <nav class="fixed top-0 w-full z-50 glass-blur px-10 py-6 flex justify-between items-center">
        <div class="font-modern text-3xl font-black italic tracking-tighter text-white">CAPTAIN<span class="text-blue-500">.</span></div>
        <div class="flex gap-8 items-center">
            <div onclick="toggleCart()" class="cursor-pointer relative group">
                <i class="fa-solid fa-cart-shopping text-xl group-hover:text-blue-500 transition"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-black">0</span>
            </div>
        </div>
    </nav>

    <main class="pt-32 px-10">
        <header class="mb-16">
            <h2 class="text-blue-500 font-bold tracking-[0.4em] text-[10px] uppercase mb-4">Digital Flagship Store v9.0</h2>
            <h1 class="text-6xl md:text-8xl font-modern font-black italic leading-[0.9] tracking-tighter">ELITE <br> CURATION<span class="text-blue-500">.</span></h1>
        </header>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10 pb-32">
            </div>
    </main>

    <div id="cart-side" class="fixed inset-y-0 right-0 w-full md:w-[500px] glass-blur z-[100] translate-x-full transition-transform duration-700 p-12 flex flex-col">
        <div class="flex justify-between items-center mb-12">
            <h3 class="font-modern text-3xl font-black italic">CART</h3>
            <button onclick="toggleCart()" class="text-4xl hover:rotate-90 transition duration-300">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-8 no-scrollbar"></div>
        <div class="pt-10 border-t border-white/10">
            <div class="flex justify-between text-4xl font-modern font-black mb-8">
                <span class="text-xs text-gray-500 self-center tracking-widest uppercase">Total Bill</span>
                <span id="total-price" class="text-blue-500 italic">฿0</span>
            </div>
            <button onclick="checkout()" class="btn-premium w-full py-6 rounded-3xl font-bold uppercase tracking-[0.2em] text-sm italic shadow-2xl shadow-blue-500/20">
                Secure Checkout
            </button>
        </div>
    </div>

    <script>
        const sfx = { 
            pop: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
            ding: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3') 
        };

        const products = [
            { id: 1, name: 'Sovereign Tee', price: 1200, cat: 'Tops', stock: 'Low', img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800' },
            { id: 2, name: 'Apex Runner', price: 4800, cat: 'Footwear', stock: 'In Stock', img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800' },
            { id: 3, name: 'Onyx Shades', price: 1500, cat: 'Accessories', stock: 'In Stock', img: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=800' },
            { id: 4, name: 'Phantom Bag', price: 3200, cat: 'Bags', stock: 'Low', img: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800' }
        ];

        let cart = [];

        function render() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="product-card group relative">
                    <div class="relative aspect-[3/4] rounded-[40px] overflow-hidden mb-6 bg-[#111]">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                        <div class="absolute top-6 left-6">
                            <span class="px-4 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest ${p.stock === 'Low' ? 'badge-low' : 'bg-blue-500/20 text-blue-500 border border-blue-500/30'}">${p.stock}</span>
                        </div>
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-8">
                            <button onclick="add(${p.id})" class="btn-premium w-full py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest italic">Add to Archive</button>
                        </div>
                    </div>
                    <div class="px-4">
                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-2">${p.cat}</p>
                        <h4 class="text-xl font-bold uppercase italic">${p.name}</h4>
                        <p class="text-2xl font-modern font-black italic mt-1 text-blue-500">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            sfx.ding.play();
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
            
            const toast = document.getElementById('toast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2000);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex gap-6 items-center group">
                    <img src="${item.img}" class="w-20 h-24 rounded-3xl object-cover shadow-xl">
                    <div class="flex-grow">
                        <h5 class="text-[10px] text-gray-500 font-bold uppercase mb-1">${item.cat}</h5>
                        <h4 class="text-xs font-bold uppercase italic">${item.name}</h4>
                        <p class="text-lg font-modern font-black italic text-blue-500 mt-1">฿${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="cart.splice(${i},1); updateCart(); sfx.pop.play();" class="w-10 h-10 rounded-full hover:bg-red-500/10 hover:text-red-500 transition flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function toggleCart() {
            sfx.pop.play();
            document.getElementById('cart-side').classList.toggle('translate-x-full');
        }

        function checkout() {
            if(cart.length === 0) return alert("Archive is empty.");
            sfx.ding.play();
            alert("Order Synchronized with Database.");
            cart = []; updateCart(); toggleCart();
        }

        render();
    </script>
</body>
</html>
