<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Biz Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0c; --card: #16161a; }
        body { font-family: sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; padding: 20px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        h2 { color: var(--accent); text-align: center; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: var(--accent); border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats { display: flex; gap: 10px; margin-bottom: 15px; text-align: center; }
        .stat-box { flex: 1; background: #000; padding: 10px; border-radius: 8px; border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body>

    <h2>👾 MONSTER CONTROL</h2>
    
    <div class="stats">
        <div class="stat-box"><small>วันนี้</small><br><b id="todaySum">0</b></div>
        <div class="stat-box"><small>เดือนนี้</small><br><b id="monthSum">0</b></div>
    </div>

    <div class="card"><canvas id="myChart" height="150"></canvas></div>

    <div class="card">
        <input type="text" id="name" placeholder="ชื่อรายการ/ลูกค้า">
        <input type="number" id="price" placeholder="ยอดเงิน">
        <button id="saveBtn" onclick="saveData()">💾 บันทึกข้อมูลไปที่ Cloud</button>
    </div>

    <script>
        // *** วาง URL ที่ก๊อปมาจาก Google ตรงนี้ ***
        const URL_API = "วาง_URL_เว็บแอป_ของคุณที่นี่";

        async function saveData() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            if(!name || !price) return alert("กรุณากรอกข้อมูล");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            const month = new Date().toISOString().substring(0, 7);

            try {
                // ใช้โหมด no-cors เพื่อข้ามปัญหา Security ของเบราว์เซอร์
                await fetch(URL_API, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ name, price, month })
                });
                alert("บันทึกสำเร็จ!");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ Cloud");
                btn.disabled = false;
                btn.innerText = "💾 บันทึกข้อมูลไปที่ Cloud";
            }
        }

        async function loadData() {
            try {
                const res = await fetch(URL_API);
                const rawData = await res.json();
                renderDashboard(rawData.slice(1)); // ตัดหัวตารางออก
            } catch (e) { console.log("กำลังรอข้อมูลจาก Cloud..."); }
        }

        function renderDashboard(records) {
            const today = new Date().toISOString().split('T')[0];
            const thisMonth = today.substring(0, 7);
            let tSum = 0, mSum = 0, chartMap = {};

            records.forEach(r => {
                const rDate = new Date(r[0]).toISOString().split('T')[0];
                const rPrice = parseFloat(r[2]);
                if(rDate === today) tSum += rPrice;
                if(r[3] === thisMonth) mSum += rPrice;
                chartMap[rDate] = (chartMap[rDate] || 0) + rPrice;
            });

            document.getElementById('todaySum').innerText = tSum.toLocaleString();
            document.getElementById('monthSum').innerText = mSum.toLocaleString();

            const ctx = document.getElementById('myChart');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(chartMap).sort().slice(-5),
                    datasets: [{ label: 'ยอดขาย', data: Object.values(chartMap), borderColor: '#00ffcc', tension: 0.3 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }
        loadData();
    </script>
</body>
</html>
