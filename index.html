<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOTHING BRAND | Modern Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --accent: #3b82f6; --dark-bg: #0a0a0c; --card-bg: #16161a; }
        body { font-family: 'Anuphan', sans-serif; background-color: var(--dark-bg); color: #e2e8f0; scroll-behavior: smooth; }
        .font-modern { font-family: 'Space Grotesk', sans-serif; }
        .blue-gradient { background: linear-gradient(135deg, #60a5fa, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .size-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center bg-[#0a0a0c]/90 backdrop-blur-md border-b border-white/5">
        <h1 class="text-2xl font-bold font-modern blue-gradient">CAPTAIN BRAND</h1>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-[10px] px-1.5 rounded-full font-bold text-white">0</span>
        </div>
    </nav>

    <header class="py-16 px-6 text-center border-b border-white/5">
        <h2 class="text-4xl md:text-6xl font-bold font-modern mb-4 uppercase tracking-tighter">New <span class="blue-gradient">Collection</span> 2024</h2>
        <p class="text-gray-400 text-sm md:text-base">ยกระดับการแต่งตัวของคุณด้วยเสื้อผ้าคุณภาพพรีเมียม</p>
    </header>

    <main class="py-12 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="product-grid">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-96 bg-[#16161a] shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold font-modern">YOUR BAG</h2>
            <button onclick="toggleCart()" class="text-gray-400"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t border-white/10 mt-auto">
            <div class="flex justify-between text-lg font-bold mb-6">
                <span>ยอดรวมสุทธิ</span>
                <span id="total-price" class="blue-gradient">฿0</span>
            </div>
            <button onclick="sendToLine()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition flex items-center justify-center gap-2">
                <i class="fab fa-line text-2xl"></i> สั่งซื้อผ่าน Line (สรุปยอดอัตโนมัติ)
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Oversized Black Tee', price: 590, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500', stock: 'In Stock' },
            { id: 2, name: 'Street White Hoodie', price: 1290, img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500', stock: 'Limited' },
            { id: 3, name: 'Vintage Denim Jacket', price: 1890, img: 'https://images.unsplash.com/photo-1523205771623-e0faa4d2813d?w=500', stock: 'In Stock' }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="glass-card rounded-2xl overflow-hidden flex flex-col">
                    <div class="relative group">
                        <img src="${p.img}" class="w-full aspect-[3/4] object-cover">
                        <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] uppercase font-bold text-blue-400 border border-blue-500/30">
                            ${p.stock}
                        </div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <h3 class="text-xl font-bold mb-1">${p.name}</h3>
                        <p class="text-blue-400 font-bold font-modern mb-4">฿${p.price.toLocaleString()}</p>
                        
                        <div class="mb-4">
                            <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Select Size</p>
                            <div class="flex gap-2">
                                ${['S', 'M', 'L', 'XL'].map(size => `
                                    <button onclick="selectSize(this)" class="size-btn w-10 h-10 rounded-lg border border-white/10 text-xs hover:border-blue-500 transition font-bold">${size}</button>
                                `).join('')}
                            </div>
                        </div>
                        
                        <button onclick="addToCart(${p.id}, this)" class="mt-auto w-full py-3 bg-white text-black font-bold rounded-xl hover:bg-blue-500 hover:text-white transition">
                            ใส่ตะกร้า
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function selectSize(btn) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function addToCart(id, btn) {
            const product = products.find(p => p.id === id);
            const sizeBtn = btn.parentElement.querySelector('.size-btn.active');
            
            if (!sizeBtn) return alert('กรุณาเลือกไซส์ก่อนครับ');
            
            cart.push({ ...product, selectedSize: sizeBtn.innerText, cartId: Date.now() });
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((item, idx) => `
                <div class="flex gap-4 bg-white/5 p-3 rounded-xl border border-white/5">
                    <img src="${item.img}" class="w-16 h-20 object-cover rounded-lg">
                    <div class="flex-grow">
                        <h4 class="text-sm font-bold">${item.name}</h4>
                        <p class="text-xs text-blue-400">Size: ${item.selectedSize} | ฿${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeItem(${idx})" class="text-gray-500 hover:text-red-400 px-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function sendToLine() {
            if (cart.length === 0) return alert("ตะกร้าว่างเปล่าครับ");
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            let msg = "👕 สั่งซื้อสินค้าใหม่:\n------------------\n";
            cart.forEach((item, i) => {
                msg += `${i+1}. ${item.name} (ไซส์ ${item.selectedSize}) - ฿${item.price.toLocaleString()}\n`;
            });
            msg += `------------------\n💰 ยอดรวมทั้งหมด: ฿${total.toLocaleString()}\n\nกรุณาส่งข้อความนี้เพื่อยืนยันออเดอร์ครับ`;
            
            // เปลี่ยนลิงก์ด้านล่างเป็น ID Line ธุรกิจของคุณ
            window.location.href = `https://line.me/R/oaMessage/@YOUR_ID/?${encodeURIComponent(msg)}`;
        }

        renderProducts();
    </script>
</body>
</html>
