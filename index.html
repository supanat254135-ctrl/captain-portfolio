<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN MEGA ENGINE V.7 | 9 Categories & Sound</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #007AFF; --bg: #000; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        
        /* ปุ่มกดแบบเด้ง (Haptic Effect) */
        .btn-push { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; }
        .btn-push:active { transform: scale(0.9) !important; filter: brightness(1.2); }
        
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .cat-card { border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; white-space: nowrap; }
        .cat-card.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 122, 255, 0.4); }

        /* Animation ตอนเพิ่มของ */
        @keyframes bounce-in {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .item-anim { animation: bounce-in 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-5 flex justify-between items-center">
        <div class="btn-push font-modern text-2xl font-black text-blue-500 italic">CAPTAIN®</div>
        <div class="flex gap-6 items-center">
            <div onclick="playSound('click'); toggleCart();" class="btn-push relative p-2 bg-white/5 rounded-2xl border border-white/10">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </nav>

    <div class="pt-28 px-6">
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Discovery Center</p>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-4" id="cat-list">
            </div>
    </div>

    <main class="px-6 py-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6" id="product-grid">
        </main>

    <div id="cart-panel" class="fixed right-0 top-0 h-full w-full md:w-[450px] glass z-[100] translate-x-full transition-transform duration-500 p-10 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h3 class="font-modern text-3xl font-black italic">CART</h3>
            <button onclick="playSound('click'); toggleCart()" class="btn-push text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-6"></div>
        <div class="pt-8 border-t border-white/10">
            <div class="flex justify-between font-bold text-3xl mb-8">
                <span class="text-sm text-gray-500 self-center">TOTAL</span>
                <span id="total-price" class="text-blue-500 font-black">฿0</span>
            </div>
            <button onclick="checkout()" class="btn-push w-full bg-blue-600 py-5 rounded-[24px] font-bold uppercase tracking-widest text-sm shadow-xl">
                Place Order Now
            </button>
        </div>
    </div>

    <script>
        // --- Sound Engine ---
        const sfx = {
            click: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
            add: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3'),
            pop: new Audio('https://www.soundjay.com/buttons/sounds/button-4.mp3')
        };

        function playSound(name) {
            sfx[name].currentTime = 0;
            sfx[name].play().catch(() => {});
        }

        // --- Categories Data (9 หมวดหลัก) ---
        const categories = ["All", "Tops", "Bottoms", "Women", "Headwear", "Footwear", "Bags", "Accessories", "Seasonal", "Special"];
        
        // --- Products Data (ตัวอย่างให้ครบทุกหมวด) ---
        const products = [
            { id: 1, name: 'Cyber Tee', price: 990, cat: 'Tops', img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400' },
            { id: 2, name: 'Denim X', price: 2400, cat: 'Bottoms', img: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400' },
            { id: 3, name: 'Silk Dress', price: 1890, cat: 'Women', img: 'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400' },
            { id: 4, name: 'Neon Bucket', price: 750, cat: 'Headwear', img: 'https://images.unsplash.com/photo-1576871337622-98d48d365da2?w=400' },
            { id: 5, name: 'Vortex Shoes', price: 4200, cat: 'Footwear', img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
            { id: 6, name: 'Sling Tech', price: 1550, cat: 'Bags', img: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400' },
            { id: 7, name: 'Cyber Shades', price: 1200, cat: 'Accessories', img: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400' },
            { id: 8, name: 'Winter Parka', price: 5900, cat: 'Seasonal', img: 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400' }
        ];

        let cart = [];
        let currentCat = "All";

        function init() {
            renderCats();
            renderProducts();
        }

        function renderCats() {
            document.getElementById('cat-list').innerHTML = categories.map(c => `
                <div onclick="playSound('pop'); setCat('${c}')" class="cat-card btn-push px-6 py-2.5 rounded-2xl text-[11px] font-bold uppercase tracking-widest ${currentCat === c ? 'active' : ''}">${c}</div>
            `).join('');
        }

        function setCat(c) {
            currentCat = c;
            renderCats();
            renderProducts(c === "All" ? products : products.filter(p => p.cat === c));
        }

        function renderProducts(items = products) {
            document.getElementById('product-grid').innerHTML = items.map(p => `
                <div class="product-card group bg-[#0a0a0a] rounded-[32px] overflow-hidden p-3 border border-white/5 transition hover:border-blue-500/50">
                    <div class="relative aspect-[4/5] rounded-[24px] overflow-hidden mb-4">
                        <img src="${p.img}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <button onclick="add(${p.id})" class="btn-push bg-white text-black px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Add to Bag</button>
                        </div>
                    </div>
                    <div class="px-2">
                        <p class="text-[9px] text-blue-500 font-bold uppercase tracking-tighter mb-1">${p.cat}</p>
                        <h4 class="text-xs font-bold uppercase truncate">${p.name}</h4>
                        <p class="font-modern font-black italic mt-1 text-gray-400">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            playSound('add');
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="glass p-5 rounded-3xl flex gap-5 items-center item-anim">
                    <img src="${item.img}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-grow">
                        <h5 class="text-[10px] font-bold uppercase">${item.name}</h5>
                        <p class="text-blue-500 font-black italic">฿${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="playSound('pop'); cart.splice(${i},1); updateUI();" class="btn-push text-gray-600 p-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('translate-x-full');
        }

        function checkout() {
            if(cart.length === 0) return alert("ตะกร้ายังว่างอยู่นะครับ!");
            playSound('add');
            alert("ออเดอร์ถูกบันทึกลงระบบแล้วครับ ขอบคุณครับคุณลูกค้า!");
            cart = []; updateUI(); toggleCart();
        }

        init();
    </script>
</body>
</html>
