<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN X | Future Wear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --blue-glow: #3b82f6; --dark-pure: #000000; --card-bg: #0a0a0a; }
        body { font-family: 'Anuphan', sans-serif; background-color: var(--dark-pure); color: #fff; overflow-x: hidden; }
        .font-modern { font-family: 'Outfit', sans-serif; }

        /* Animation Background */
        .bg-gradient-blur {
            position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px); z-index: -1; animation: float 10s infinite alternate;
        }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(20%, 20%); } }

        /* Modern Card & Buttons */
        .ultra-card {
            background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .ultra-card:hover {
            border-color: var(--blue-glow); box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); transform: translateY(-10px);
        }

        .btn-glow {
            position: relative; overflow: hidden; transition: all 0.3s ease;
            background: #fff; color: #000; border-radius: 99px; font-weight: 700;
        }

        .btn-glow:hover {
            background: var(--blue-glow); color: #fff; box-shadow: 0 0 20px var(--blue-glow);
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .active-tab { border-bottom: 2px solid var(--blue-glow); color: var(--blue-glow) !important; }
    </style>
</head>
<body>
    <div class="bg-gradient-blur"></div>

    <nav class="fixed top-0 w-full z-[100] px-8 py-6 flex justify-between items-center backdrop-blur-lg border-b border-white/5">
        <div class="text-2xl font-bold font-modern tracking-[0.2em] uppercase">Captain<span class="text-blue-500">.</span></div>
        
        <div class="hidden md:flex gap-10 text-[10px] font-bold tracking-[0.3em] uppercase text-gray-400">
            <button onclick="filterCat('All')" class="nav-link active-tab transition hover:text-white">All</button>
            <button onclick="filterCat('T-Shirt')" class="nav-link transition hover:text-white">T-Shirt</button>
            <button onclick="filterCat('Hoodie')" class="nav-link transition hover:text-white">Outer</button>
        </div>

        <button onclick="toggleCart()" class="relative group">
            <div class="w-12 h-12 flex items-center justify-center rounded-full border border-white/10 group-hover:border-blue-500 transition">
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-black">0</span>
        </button>
    </nav>

    <main class="pt-32 pb-20 px-8 max-w-[1400px] mx-auto">
        <div class="mb-16">
            <h2 class="text-[10px] tracking-[0.5em] text-blue-500 uppercase font-bold mb-4 italic">Available Now</h2>
            <h1 class="text-5xl md:text-7xl font-bold font-modern tracking-tighter">FUTURE <br> ARCHIVE<span class="text-blue-500">.</span></h1>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed right-4 top-4 bottom-4 w-[calc(100%-32px)] md:w-[400px] ultra-card rounded-[32px] translate-x-[120%] transition-transform duration-700 z-[110] p-8 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-xl font-bold font-modern uppercase tracking-widest italic">Bag</h3>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto space-y-8 pr-2">
            </div>

        <div class="mt-8 pt-8 border-t border-white/5">
            <div class="flex justify-between items-end mb-8">
                <span class="text-gray-500 text-xs uppercase tracking-widest font-bold">Total Est.</span>
                <span id="total-price" class="text-3xl font-modern font-bold tracking-tighter">฿0</span>
            </div>
            <button onclick="checkout()" class="w-full btn-glow py-5 text-xs uppercase tracking-[0.2em]">
                Confirm Purchase
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'NOVA OVERSIZE', price: 790, cat: 'T-Shirt', img: 'https://images.unsplash.com/photo-1554568218-0f1715e72254?w=800' },
            { id: 2, name: 'GHOST HOODIE', price: 1590, cat: 'Hoodie', img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800' },
            { id: 3, name: 'VOID CARGO', price: 1890, cat: 'Pants', img: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=800' },
            { id: 4, name: 'CORE BEANIE', price: 450, cat: 'Acc', img: 'https://images.unsplash.com/photo-1576871337622-98d48d365da2?w=800' }
        ];

        let cart = [];

        function render(items = products) {
            document.getElementById('product-grid').innerHTML = items.map(p => `
                <div class="ultra-card rounded-[40px] p-4 flex flex-col group">
                    <div class="relative overflow-hidden rounded-[30px] aspect-[3/4] mb-6">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <button onclick="add(${p.id})" class="btn-glow px-8 py-3 text-[10px] uppercase tracking-widest">Quick Add</button>
                        </div>
                    </div>
                    <div class="px-2 pb-2">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-sm tracking-tight">${p.name}</h4>
                            <span class="text-xs text-blue-500 font-bold italic">${p.cat}</span>
                        </div>
                        <p class="text-lg font-modern tracking-tighter text-gray-400">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-[120%]');
        }

        function add(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            update();
            toggleCart();
        }

        function update() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex gap-6 animate-slideIn">
                    <img src="${item.img}" class="w-20 h-24 rounded-2xl object-cover">
                    <div class="flex flex-col justify-center flex-grow">
                        <h5 class="text-xs font-bold uppercase tracking-widest mb-1">${item.name}</h5>
                        <p class="text-sm font-modern text-blue-500">฿${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="remove(${i})" class="text-gray-700 hover:text-white transition"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
            
            const total = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
        }

        function remove(i) { cart.splice(i, 1); update(); }

        function filterCat(c) {
            render(c === 'All' ? products : products.filter(x => x.cat === c));
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.toggle('active-tab', l.innerText.includes(c));
            });
        }

        function checkout() {
            if(!cart.length) return;
            const msg = `สนใจสั่งซื้อ:\n${cart.map(x => `- ${x.name}`).join('\n')}\nรวม ฿${cart.reduce((s,x)=>s+x.price,0).toLocaleString()}`;
            window.location.href = `https://line.me/R/oaMessage/@YOUR_ID/?${encodeURIComponent(msg)}`;
        }

        render();
    </script>
</body>
</html>
