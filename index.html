<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN CINEMATIC | Next-Gen Retail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #007AFF; --bg: #000; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        
        /* Glassmorphism & Effects */
        .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-push { transition: 0.1s; cursor: pointer; }
        .btn-push:active { transform: scale(0.9); }
        
        /* Hero Video Section */
        .hero-video { height: 60vh; position: relative; overflow: hidden; border-radius: 0 0 50px 50px; }
        .hero-video video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        /* Toast Notification */
        #toast { position: fixed; top: 100px; right: 20px; transform: translateX(150%); transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 200; }
        #toast.show { transform: translateX(0); }

        .product-card { background: #0f0f0f; border-radius: 30px; transition: 0.4s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0, 122, 255, 0.2); }
    </style>
</head>
<body>

    <div id="toast" class="glass px-6 py-4 rounded-2xl flex items-center gap-4">
        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-check"></i></div>
        <div><p class="text-xs font-bold uppercase">เพิ่มลงตะกร้าแล้ว</p><p class="text-[10px] text-gray-400">สินค้าพร้อมส่งภายใน 24 ชม.</p></div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass px-8 py-5 flex justify-between items-center">
        <div class="font-modern text-2xl font-black italic text-blue-500">CAPTAIN®</div>
        <div class="flex gap-6 items-center">
            <div onclick="toggleCart()" class="btn-push relative p-3 bg-white/5 rounded-2xl border border-white/10">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </nav>

    <section class="hero-video shadow-2xl">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-model-posing-in-neon-lights-34444-large.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
        <div class="absolute bottom-12 left-12">
            <h2 class="text-5xl md:text-7xl font-modern font-black italic leading-none">THE NEW <br> STANDARD.</h2>
            <p class="text-blue-500 font-bold mt-4 tracking-[0.5em] text-xs">COLLECTION 2026 OUT NOW</p>
        </div>
    </section>

    <div class="px-8 py-10 flex gap-4 overflow-x-auto no-scrollbar">
        <button onclick="filter('All')" class="btn-push px-8 py-3 rounded-full glass text-xs font-bold uppercase border-blue-500/50">All Items</button>
        <button onclick="filter('Tops')" class="btn-push px-8 py-3 rounded-full glass text-xs font-bold uppercase">Shirts</button>
        <button onclick="filter('Footwear')" class="btn-push px-8 py-3 rounded-full glass text-xs font-bold uppercase">Shoes</button>
        <button onclick="filter('Accessory')" class="btn-push px-8 py-3 rounded-full glass text-xs font-bold uppercase">Accessories</button>
    </div>

    <main class="px-8 grid grid-cols-2 md:grid-cols-4 gap-8 pb-32" id="grid"></main>

    <script>
        const sfx = { 
            click: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
            ding: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3') 
        };

        const products = [
            { id: 1, name: 'Nova Tee', cat: 'Tops', price: 990, img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=500' },
            { id: 2, name: 'Aero Boost', cat: 'Footwear', price: 4500, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500' },
            { id: 3, name: 'Cyber Shades', cat: 'Accessory', price: 1200, img: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500' },
            { id: 4, name: 'Cargo Tech', cat: 'Tops', price: 2800, img: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=500' }
        ];

        let cartCount = 0;

        function render(items = products) {
            document.getElementById('grid').innerHTML = items.map(p => `
                <div class="product-card p-3 group">
                    <div class="relative aspect-square rounded-[24px] overflow-hidden mb-5">
                        <img src="${p.img}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center p-6">
                            <button onclick="add(${p.id})" class="btn-push w-full bg-white text-black py-3 rounded-xl font-bold text-[10px] uppercase">Add to Bag</button>
                        </div>
                    </div>
                    <div class="px-2">
                        <h4 class="text-sm font-bold uppercase tracking-tight">${p.name}</h4>
                        <p class="text-blue-500 font-black italic mt-1">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            sfx.ding.play();
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
            
            // Show Toast
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function filter(c) {
            sfx.click.play();
            render(c === 'All' ? products : products.filter(p => p.cat === c));
        }

        render();
    </script>
</body>
</html>
