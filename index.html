<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN MEGA STORE | Global Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #007AFF; --bg: #000; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .category-card { transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .category-card:hover, .category-card.active { border-color: var(--accent); background: rgba(0, 122, 255, 0.1); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black font-modern text-blue-500">CAPTAIN®</h1>
        <div class="flex-grow max-w-md mx-8">
            <input type="text" onkeyup="searchItems(this.value)" placeholder="ค้นหาสินค้า (รองเท้า, หมวก, เสื้อ...)" class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-2 text-sm outline-none focus:border-blue-500">
        </div>
        <div class="flex gap-6">
            <button onclick="toggleTab('cart')" class="relative"><i class="fa-solid fa-cart-shopping"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
            <button onclick="toggleTab('admin')"><i class="fa-solid fa-user-gear"></i></button>
        </div>
    </nav>

    <main class="pt-28 px-6 pb-20">
        <div class="flex gap-4 overflow-x-auto pb-8 no-scrollbar">
            <div onclick="filterCat('All')" class="category-card active px-8 py-3 rounded-2xl whitespace-nowrap font-bold text-sm uppercase">All Items</div>
            <div onclick="filterCat('Apparel')" class="category-card px-8 py-3 rounded-2xl whitespace-nowrap font-bold text-sm uppercase">👕 Apparel</div>
            <div onclick="filterCat('Footwear')" class="category-card px-8 py-3 rounded-2xl whitespace-nowrap font-bold text-sm uppercase">👟 Footwear</div>
            <div onclick="filterCat('Headwear')" class="category-card px-8 py-3 rounded-2xl whitespace-nowrap font-bold text-sm uppercase">🧢 Headwear</div>
            <div onclick="filterCat('Accessory')" class="category-card px-8 py-3 rounded-2xl whitespace-nowrap font-bold text-sm uppercase">🕶 Accessories</div>
        </div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="checkout-panel" class="fixed inset-0 z-[100] glass hidden p-8 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between mb-10">
                <h2 class="text-4xl font-black italic">CHECKOUT & PAYMENT</h2>
                <button onclick="toggleTab('cart')" class="text-3xl">&times;</button>
            </div>
            <div class="grid md:grid-cols-2 gap-12">
                <div id="cart-list" class="space-y-4"></div>
                <div class="glass p-8 rounded-[40px] border-blue-500/30">
                    <h3 class="font-bold mb-6">สรุปการสั่งซื้อ</h3>
                    <div class="space-y-3 text-sm text-gray-400 mb-6 border-b border-white/10 pb-6">
                        <div class="flex justify-between"><span>ยอดรวม</span><span id="subtotal">฿0</span></div>
                        <div class="flex justify-between"><span>ภาษี (7%)</span><span id="tax">฿0</span></div>
                        <div class="flex justify-between text-white font-bold text-xl"><span>รวมสุทธิ</span><span id="total">฿0</span></div>
                    </div>
                    <p class="text-xs font-bold mb-4 uppercase text-blue-500">เลือกช่องทางชำระเงิน</p>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <button class="glass p-4 rounded-2xl hover:border-blue-500 transition text-[10px] font-bold uppercase tracking-widest">PromptPay / QR</button>
                        <button class="glass p-4 rounded-2xl hover:border-blue-500 transition text-[10px] font-bold uppercase tracking-widest">Credit Card</button>
                    </div>
                    <button onclick="confirmOrder()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest italic">ยืนยันการสั่งซื้อ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฐานข้อมูลสินค้าแบบหลากหลาย (ขยายได้ไม่จำกัด)
        const products = [
            { id: 1, name: 'Vortex Oversize', price: 990, cat: 'Apparel', img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400' },
            { id: 2, name: 'Neon Runner X1', price: 4500, cat: 'Footwear', img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
            { id: 3, name: 'Cyber Trucker Hat', price: 1200, cat: 'Headwear', img: 'https://images.unsplash.com/photo-1588850567047-1845a9ee0280?w=400' },
            { id: 4, name: 'Future Shades', price: 2800, cat: 'Accessory', img: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400' },
            { id: 5, name: 'Shadow Cargo', price: 3200, cat: 'Apparel', img: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=400' },
            { id: 6, name: 'Urban Glide Shoes', price: 3800, cat: 'Footwear', img: 'https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=400' }
        ];

        let cart = [];

        function renderProducts(items = products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="glass rounded-[32px] overflow-hidden p-2 group">
                    <div class="relative aspect-square rounded-[26px] overflow-hidden">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-4 right-4 w-12 h-12 bg-white text-black rounded-full flex items-center justify-center font-bold shadow-xl hover:bg-blue-600 hover:text-white transition"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="p-4">
                        <p class="text-[10px] font-bold text-blue-500 uppercase">${p.cat}</p>
                        <h4 class="font-bold text-sm uppercase mt-1">${p.name}</h4>
                        <p class="font-black italic mt-2">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterCat(cat) {
            renderProducts(cat === 'All' ? products : products.filter(p => p.cat === cat));
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const sub = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('subtotal').innerText = `฿${sub.toLocaleString()}`;
            document.getElementById('tax').innerText = `฿${(sub * 0.07).toLocaleString()}`;
            document.getElementById('total').innerText = `฿${(sub * 1.07).toLocaleString()}`;
            
            document.getElementById('cart-list').innerHTML = cart.map((item, i) => `
                <div class="flex gap-4 glass p-4 rounded-2xl">
                    <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-grow"><h5 class="text-xs font-bold uppercase">${item.name}</h5><p class="text-blue-500 font-bold">฿${item.price.toLocaleString()}</p></div>
                    <button onclick="cart.splice(${i},1); updateCart();" class="text-gray-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function toggleTab(id) {
            document.getElementById('checkout-panel').classList.toggle('hidden');
        }

        function searchItems(val) {
            const filtered = products.filter(p => p.name.toLowerCase().includes(val.toLowerCase()) || p.cat.toLowerCase().includes(val.toLowerCase()));
            renderProducts(filtered);
        }

        function confirmOrder() {
            alert("บันทึกคำสั่งซื้อลงระบบหลังบ้าน และส่งข้อมูลไปยัง Line OA เรียบร้อยครับ!");
            cart = []; updateCart(); toggleTab('cart');
        }

        renderProducts();
    </script>
</body>
</html>
