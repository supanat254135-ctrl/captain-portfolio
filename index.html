<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN ULTIMATE SYSTEM | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #007AFF; --bg: #000; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .page { display: none; height: calc(100vh - 80px); overflow-y: auto; padding-bottom: 100px; }
        .page.active { display: block; animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-haptic:active { transform: scale(0.92); filter: brightness(1.2); }
        .nav-active { color: var(--blue); }
        .cat-tag { background: rgba(0, 122, 255, 0.1); border: 1px solid rgba(0, 122, 255, 0.2); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full z-[200] opacity-0 transition-all pointer-events-none">
        <p class="text-[10px] font-bold uppercase tracking-widest text-blue-500"><i class="fa-solid fa-circle-check mr-2"></i>อัปเดตข้อมูลเรียบร้อย</p>
    </div>

    <nav class="glass px-8 py-5 flex justify-between items-center z-[150]">
        <div class="font-modern text-2xl font-black italic text-blue-500">CAPTAIN®</div>
        <div class="flex gap-6 items-center">
            <div onclick="showPage('cart')" class="btn-haptic relative cursor-pointer">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        
        <div id="home" class="page active px-6 pt-8">
            <div class="glass rounded-[40px] p-8 mb-8 bg-gradient-to-br from-blue-900/20 to-transparent">
                <h2 class="text-5xl font-modern font-black italic leading-none mb-4">NEW<br>ENERGY.</h2>
                <p class="text-[10px] font-bold tracking-[0.4em] text-blue-500 uppercase">Premium Streetwear 2026</p>
            </div>
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-6">สินค้าแนะนำ</h3>
            <div id="home-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="explore" class="page px-6 pt-8">
            <h2 class="text-3xl font-black italic mb-8">CATEGORIES</h2>
            <div class="grid grid-cols-2 gap-4" id="cat-grid">
                </div>
        </div>

        <div id="cart" class="page px-6 pt-8">
            <h2 class="text-3xl font-black italic mb-8">YOUR BAG</h2>
            <div id="cart-list" class="space-y-4 mb-8"></div>
            <div class="glass p-8 rounded-[40px]">
                <div class="flex justify-between text-2xl font-black italic mb-6">
                    <span class="text-xs text-gray-500 uppercase self-center">Total</span>
                    <span id="total-price" class="text-blue-500">฿0</span>
                </div>
                <button onclick="checkout()" class="btn-haptic w-full bg-blue-600 py-5 rounded-3xl font-bold uppercase tracking-widest text-xs">Checkout Now</button>
            </div>
        </div>

        <div id="admin" class="page px-6 pt-8">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic">DASHBOARD</h2>
                <span class="text-[9px] bg-green-500/20 text-green-500 px-3 py-1 rounded-full font-bold">LIVE ONLINE</span>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass p-6 rounded-3xl text-center"><p class="text-[10px] text-gray-500 mb-2 font-bold uppercase">ยอดขายวันนี้</p><h4 class="text-xl font-black">฿42,500</h4></div>
                <div class="glass p-6 rounded-3xl text-center"><p class="text-[10px] text-gray-500 mb-2 font-bold uppercase">ออเดอร์ใหม่</p><h4 class="text-xl font-black">18 รายการ</h4></div>
            </div>
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">รายการสต็อก (9 หมวด)</h3>
            <div class="glass rounded-3xl overflow-hidden" id="stock-list"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full glass flex justify-around py-5 z-[150] border-t border-white/5">
        <button onclick="showPage('home')" class="nav-btn btn-haptic nav-active"><i class="fa-solid fa-house"></i></button>
        <button onclick="showPage('explore')" class="nav-btn btn-haptic"><i class="fa-solid fa-list-ul"></i></button>
        <button onclick="showPage('admin')" class="nav-btn btn-haptic"><i class="fa-solid fa-chart-simple"></i></button>
        <button onclick="showPage('cart')" class="nav-btn btn-haptic"><i class="fa-solid fa-user"></i></button>
    </nav>

    <script>
        const sfx = { click: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'), success: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3') };
        
        const products = [
            { id: 1, name: 'Cyber Tee', cat: 'เสื้อ (Tops)', price: 990, img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400' },
            { id: 2, name: 'Denim Raw', cat: 'กางเกง (Bottoms)', price: 2400, img: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400' },
            { id: 3, name: 'Aero Boot', cat: 'รองเท้า (Footwear)', price: 4200, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
            { id: 4, name: 'Neon Cap', cat: 'หมวก (Headwear)', price: 750, img: 'https://images.unsplash.com/photo-1588850567047-1845a9ee0280?w=400' }
        ];

        const cats = ["เสื้อ (Tops)", "กางเกง (Bottoms)", "ผู้หญิง (Women)", "หมวก (Headwear)", "รองเท้า (Footwear)", "กระเป๋า (Bags)", "แอคเซสซอรี่", "ฤดูกาล", "พิเศษ"];

        let cart = [];

        function showPage(id) {
            sfx.click.play();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Notification Toast
            const toast = document.getElementById('toast');
            toast.style.opacity = '1'; toast.style.top = '100px';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.top = '24px'; }, 1500);
        }

        function init() {
            // Render Home
            document.getElementById('home-grid').innerHTML = products.map(p => `
                <div class="glass p-3 rounded-[32px] btn-haptic" onclick="addToCart(${p.id})">
                    <img src="${p.img}" class="rounded-[24px] mb-4 aspect-square object-cover">
                    <p class="text-[8px] text-blue-500 font-bold uppercase mb-1">${p.cat}</p>
                    <h4 class="text-[10px] font-bold uppercase truncate">${p.name}</h4>
                    <p class="text-sm font-black italic">฿${p.price.toLocaleString()}</p>
                </div>
            `).join('');

            // Render 9 Categories
            document.getElementById('cat-grid').innerHTML = cats.map(c => `
                <div class="glass p-8 rounded-[32px] text-center btn-haptic">
                    <p class="text-[10px] font-bold uppercase tracking-widest">${c}</p>
                </div>
            `).join('');

            // Render Stock
            document.getElementById('stock-list').innerHTML = cats.map(c => `
                <div class="flex justify-between p-5 border-b border-white/5 text-[10px] font-bold">
                    <span>${c}</span><span class="text-blue-500">พร้อมจำหน่าย</span>
                </div>
            `).join('');
        }

        function addToCart(id) {
            sfx.success.play();
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
            
            document.getElementById('cart-list').innerHTML = cart.map((item, i) => `
                <div class="glass p-5 rounded-3xl flex gap-5 items-center">
                    <img src="${item.img}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-grow"><h5 class="text-[10px] font-bold uppercase">${item.name}</h5><p class="text-blue-500 font-bold italic">฿${item.price.toLocaleString()}</p></div>
                    <button onclick="cart.splice(${i},1); updateCart();" class="text-gray-600"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function checkout() {
            if(cart.length === 0) return alert("กรุณาเลือกสินค้าก่อนครับ");
            sfx.success.play();
            alert("บันทึกคำสั่งซื้อเรียบร้อย! ขอบคุณครับคุณลูกค้า");
            cart = []; updateCart(); showPage('home');
        }

        init();
    </script>
</body>
                    </html>
