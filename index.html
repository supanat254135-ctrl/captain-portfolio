<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN OS | Full Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #007AFF; --bg: #000; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .page-content { display: none; animation: fadeIn 0.4s ease-out; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body>

    <nav class="fixed bottom-0 w-full z-[100] glass px-6 py-4 flex justify-between items-center border-t border-white/5">
        <button onclick="showPage('home')" class="nav-item active flex flex-col items-center gap-1 text-[10px] font-bold uppercase">
            <i class="fa-solid fa-house text-lg"></i><span>Home</span>
        </button>
        <button onclick="showPage('search')" class="nav-item flex flex-col items-center gap-1 text-[10px] font-bold uppercase">
            <i class="fa-solid fa-magnifying-glass text-lg"></i><span>Search</span>
        </button>
        <button onclick="showPage('orders')" class="nav-item flex flex-col items-center gap-1 text-[10px] font-bold uppercase">
            <i class="fa-solid fa-box text-lg"></i><span>Orders</span>
        </button>
        <button onclick="showPage('profile')" class="nav-item flex flex-col items-center gap-1 text-[10px] font-bold uppercase">
            <i class="fa-solid fa-user text-lg"></i><span>Profile</span>
        </button>
    </nav>

    <main id="home" class="page-content active pt-10 pb-32 px-6">
        <h2 class="font-modern text-4xl font-black italic mb-8">NEW ARRIVALS</h2>
        <div class="grid grid-cols-2 gap-6" id="home-grid">
            </div>
    </main>

    <main id="search" class="page-content pt-20 pb-32 px-6">
        <h2 class="font-modern text-2xl font-black italic mb-6">EXPLORE</h2>
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass p-6 rounded-3xl border-blue-500/20 text-center">👕<p class="text-[10px] font-bold mt-2">TOPS</p></div>
            <div class="glass p-6 rounded-3xl text-center">👖<p class="text-[10px] font-bold mt-2">BOTTOMS</p></div>
            <div class="glass p-6 rounded-3xl text-center">👟<p class="text-[10px] font-bold mt-2">SHOES</p></div>
            <div class="glass p-6 rounded-3xl text-center">🎒<p class="text-[10px] font-bold mt-2">BAGS</p></div>
        </div>
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Trending Now</p>
        <div class="space-y-4" id="trending-list"></div>
    </main>

    <main id="orders" class="page-content pt-20 pb-32 px-6">
        <h2 class="font-modern text-2xl font-black italic mb-8">MY ORDERS</h2>
        <div class="space-y-6">
            <div class="glass p-6 rounded-[32px] border-l-4 border-blue-500">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] font-bold text-blue-500">ORDER #CTN-9904</p>
                        <p class="text-xs text-gray-400">2 March 2026</p>
                    </div>
                    <span class="bg-blue-500/10 text-blue-500 text-[9px] px-3 py-1 rounded-full font-bold uppercase">In Transit</span>
                </div>
                <div class="flex gap-4 items-center">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-grow">
                        <p class="text-xs font-bold uppercase">Aero Boost Runner</p>
                        <p class="text-[10px] text-gray-500 italic">Flash Express: TH0123456789</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="profile" class="page-content pt-20 pb-32 px-6">
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-full mx-auto mb-4 border-4 border-white/5 p-1">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="rounded-full bg-black">
            </div>
            <h3 class="text-xl font-bold uppercase italic">Captain User</h3>
            <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">VIP Member (1,240 pts)</p>
        </div>
        <div class="space-y-3">
            <div class="glass p-5 rounded-2xl flex justify-between items-center"><span class="text-xs font-bold uppercase">Edit Profile</span><i class="fa-solid fa-chevron-right text-[10px] text-gray-600"></i></div>
            <div class="glass p-5 rounded-2xl flex justify-between items-center"><span class="text-xs font-bold uppercase">Shipping Address</span><i class="fa-solid fa-chevron-right text-[10px] text-gray-600"></i></div>
            <div class="glass p-5 rounded-2xl flex justify-between items-center"><span class="text-xs font-bold uppercase">Payment Methods</span><i class="fa-solid fa-chevron-right text-[10px] text-gray-600"></i></div>
            <button onclick="alert('ออกจากระบบเรียบร้อย')" class="w-full py-5 text-red-500 text-xs font-bold uppercase tracking-widest mt-6">Logout</button>
        </div>
    </main>

    <script>
        const products = [
            { name: 'Tech Tee', price: 990, img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400' },
            { name: 'Cyber Runner', price: 4200, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
            { name: 'Neon Cap', price: 1200, img: 'https://images.unsplash.com/photo-1588850567047-1845a9ee0280?w=400' },
            { name: 'Onyx Shades', price: 1500, img: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400' }
        ];

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            window.scrollTo(0,0);
        }

        function render() {
            document.getElementById('home-grid').innerHTML = products.map(p => `
                <div class="glass p-3 rounded-[32px]">
                    <img src="${p.img}" class="aspect-square object-cover rounded-[24px] mb-4">
                    <h4 class="text-[10px] font-bold uppercase px-2 truncate">${p.name}</h4>
                    <p class="text-blue-500 font-black italic px-2">฿${p.price.toLocaleString()}</p>
                </div>
            `).join('');

            document.getElementById('trending-list').innerHTML = products.slice(0, 2).map(p => `
                <div class="glass p-4 rounded-3xl flex gap-4 items-center">
                    <img src="${p.img}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-grow"><h5 class="text-[10px] font-bold uppercase">${p.name}</h5><p class="text-blue-500 font-bold italic">฿${p.price.toLocaleString()}</p></div>
                    <button class="bg-white text-black text-[10px] font-bold px-4 py-2 rounded-xl">VIEW</button>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
