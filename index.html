<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN INTERACTIVE | Feel the UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --blue: #007AFF; --dark: #000; }
        body { font-family: 'Anuphan', sans-serif; background: var(--dark); color: #fff; }
        
        /* เอฟเฟกต์ปุ่มกด (Active State) */
        .interactive-btn { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .interactive-btn:active { transform: scale(0.92); opacity: 0.8; }
        
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .product-card { background: #0a0a0a; border-radius: 28px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.03); }
        .product-card:hover { border-color: var(--blue); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter text-blue-500">CAPTAIN OS</h1>
        <div class="flex gap-6">
            <div onclick="playSound('click'); toggleCart()" class="interactive-btn relative p-2">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </nav>

    <main class="pt-24 px-6">
        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.4em] mb-4">Interactive Catalog</h2>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="sidebar" class="fixed right-0 top-0 h-full w-full md:w-[400px] glass z-[100] translate-x-full transition-transform duration-500 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-xl uppercase italic">Your Bag</h3>
            <button onclick="playSound('click'); toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t border-white/10 mt-6">
            <div class="flex justify-between font-bold text-2xl mb-6">
                <span>TOTAL</span>
                <span id="total-price" class="text-blue-500 font-black">฿0</span>
            </div>
            <button onclick="processOrder()" class="interactive-btn w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">
                Confirm Purchase
            </button>
        </div>
    </div>

    <script>
        // --- Audio System ---
        const sounds = {
            click: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
            success: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3'),
            remove: new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3')
        };

        function playSound(type) {
            sounds[type].currentTime = 0;
            sounds[type].play().catch(() => {
                console.log("Audio needs user interaction first");
            });
        }

        // --- Data ---
        const products = [
            { id: 1, name: 'Tech Tee', price: 990, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400' },
            { id: 2, name: 'Cyber Shoes', price: 4200, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400' },
            { id: 3, name: 'Neon Cap', price: 1200, img: 'https://images.unsplash.com/photo-1588850567047-1845a9ee0280?w=400' },
            { id: 4, name: 'Aero Bag', price: 2800, img: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400' }
        ];

        let cart = [];

        function render() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="product-card p-2 group">
                    <div class="relative aspect-square rounded-[22px] overflow-hidden mb-4">
                        <img src="${p.img}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <button onclick="add(${p.id})" class="interactive-btn bg-white text-black px-6 py-2 rounded-xl font-bold text-xs uppercase">Add to Bag</button>
                        </div>
                    </div>
                    <div class="px-2 pb-2">
                        <h4 class="text-sm font-bold uppercase">${p.name}</h4>
                        <p class="text-blue-500 font-black italic mt-1">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
        }

        function add(id) {
            playSound('success'); // เล่นเสียงตอนเพิ่มของ
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function remove(index) {
            playSound('remove'); // เล่นเสียงตอนลบ
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="glass p-4 rounded-2xl flex gap-4 items-center animate-fadeIn">
                    <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-grow font-bold text-xs uppercase">${item.name}</div>
                    <button onclick="remove(${i})" class="text-gray-500 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function processOrder() {
            if(cart.length === 0) return alert("ยังไม่มีสินค้าในตะกร้าครับนาย!");
            playSound('success');
            alert("ระบบกำลังบันทึกออเดอร์... ขอบคุณครับ!");
            cart = [];
            updateCart();
            toggleCart();
        }

        // เริ่มต้นระบบ
        render();
    </script>
</body>
</html>
