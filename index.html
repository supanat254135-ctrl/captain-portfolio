<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM BRAND | Dashboard Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --accent: #007AFF; --bg: #000000; --panel: #0a0a0a; }
        body { font-family: 'Anuphan', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        .font-modern { font-family: 'Outfit', sans-serif; }
        
        /* Glassmorphism Cards */
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .glass-card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0, 122, 255, 0.15); }

        /* Custom Button */
        .btn-premium { background: #fff; color: #000; border-radius: 16px; font-weight: 700; transition: 0.3s; position: relative; overflow: hidden; }
        .btn-premium:hover { background: var(--accent); color: #fff; box-shadow: 0 0 25px rgba(0, 122, 255, 0.5); }
        .btn-premium:active { transform: scale(0.95); }

        /* Sidebar Animation */
        #cart-sidebar { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .active-size { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }
        
        /* สไตล์ Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] px-8 py-6 flex justify-between items-center backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-bold font-modern tracking-tighter">CAPTAIN<span class="text-blue-500">.</span>STUDIO</div>
        <div class="flex gap-8 items-center">
            <div class="relative cursor-pointer group" onclick="toggleCart()">
                <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 group-hover:border-blue-500 transition">
                    <i class="fa-solid fa-bag-shopping text-lg"></i>
                </div>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold border-2 border-black">0</span>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-8 max-w-7xl mx-auto">
        <header class="mb-16">
            <h2 class="text-blue-500 font-bold tracking-[0.3em] uppercase text-xs mb-4 italic">Spring Collection 2026</h2>
            <h1 class="text-6xl md:text-8xl font-black font-modern tracking-tighter mb-4">WEAR THE <br> FUTURE<span class="text-blue-500">.</span></h1>
        </header>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-[450px] bg-[#050505] shadow-2xl translate-x-full z-[110] flex flex-col border-l border-white/5">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h3 class="text-2xl font-black font-modern uppercase italic">Your Archive</h3>
            <button onclick="toggleCart()" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/5 transition text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto p-8 space-y-8">
            </div>

        <div class="p-8 bg-[#080808] border-t border-white/5">
            <div class="flex justify-between items-end mb-8">
                <span class="text-gray-500 text-xs font-bold uppercase tracking-widest">Subtotal</span>
                <span id="total-price" class="text-4xl font-modern font-bold tracking-tighter text-blue-500">฿0</span>
            </div>
            <button onclick="checkout()" class="w-full btn-premium py-5 text-sm uppercase tracking-[0.2em] mb-4">
                Confirm & Pay via LINE
            </button>
            <p class="text-[9px] text-center text-gray-600 uppercase tracking-widest italic">Shipping worldwide from Bangkok</p>
        </div>
    </div>

    <script>
        // --- ฐานข้อมูลสินค้า (นายเพิ่ม/ลดตรงนี้ได้เลย) ---
        const products = [
            { id: 1, name: 'CYBER-PUNK TEE', price: 990, cat: 'T-Shirt', img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=800' },
            { id: 2, name: 'NEON GHOST HOODIE', price: 2490, cat: 'Outerwear', img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800' },
            { id: 3, name: 'TECH-CARGO V3', price: 3200, cat: 'Pants', img: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=800' },
            { id: 4, name: 'SILICON BEANIE', price: 550, cat: 'Acc', img: 'https://images.unsplash.com/photo-1576871337622-98d48d365da2?w=800' }
        ];

        let cart = JSON.parse(localStorage.getItem('captain_cart')) || [];

        function renderStore() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="glass-card rounded-[40px] p-5 flex flex-col group">
                    <div class="relative overflow-hidden rounded-[32px] aspect-[3/4] mb-8">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity p-8 flex flex-col justify-end">
                            <div class="flex gap-2 mb-4">
                                ${['S', 'M', 'L', 'XL'].map(s => `<button onclick="selectSize(this, ${p.id})" class="size-opt w-10 h-10 rounded-xl border border-white/20 text-[10px] font-bold hover:bg-blue-600 transition">${s}</button>`).join('')}
                            </div>
                            <button onclick="add(${p.id})" class="btn-premium py-3 text-[10px] uppercase tracking-widest">Add to Archive</button>
                        </div>
                    </div>
                    <div class="px-2">
                        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest mb-2">${p.cat}</p>
                        <h4 class="text-xl font-bold tracking-tight mb-2 uppercase">${p.name}</h4>
                        <p class="text-2xl font-modern font-bold tracking-tighter text-gray-400 italic">฿${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            updateUI();
        }

        let selectedSizes = {};

        function selectSize(btn, pid) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.size-opt').forEach(b => b.classList.remove('active-size'));
            btn.classList.add('active-size');
            selectedSizes[pid] = btn.innerText;
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function add(pid) {
            if (!selectedSizes[pid]) return alert("กรุณาเลือกไซส์ก่อนครับนาย!");
            const p = products.find(x => x.id === pid);
            cart.push({ ...p, size: selectedSizes[pid], cartId: Date.now() });
            save();
            updateUI();
            toggleCart();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex gap-6 items-center bg-white/5 p-4 rounded-[24px] border border-white/5 shadow-inner">
                    <img src="${item.img}" class="w-20 h-24 rounded-2xl object-cover">
                    <div class="flex flex-col flex-grow">
                        <h5 class="text-xs font-bold uppercase tracking-widest mb-1">${item.name}</h5>
                        <p class="text-[10px] text-blue-500 font-bold mb-2 uppercase tracking-tighter">Size: ${item.size}</p>
                        <p class="text-lg font-modern font-bold">฿${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="remove(${i})" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
            
            const total = cart.reduce((s, x) => s + x.price, 0);
            document.getElementById('total-price').innerText = `฿${total.toLocaleString()}`;
        }

        function remove(i) { cart.splice(i, 1); save(); updateUI(); }
        function save() { localStorage.setItem('captain_cart', JSON.stringify(cart)); }

        function checkout() {
            if(!cart.length) return alert("ตะกร้ายังว่างอยู่ครับ!");
            
            const total = cart.reduce((s,x)=>s+x.price,0);
            let msg = "👕 *NEW ORDER: CAPTAIN STUDIO*\n";
            msg += "--------------------------\n";
            cart.forEach((item, i) => {
                msg += `${i+1}. ${item.name} (${item.size}) - ฿${item.price.toLocaleString()}\n`;
            });
            msg += "--------------------------\n";
            msg += `💰 *TOTAL: ฿${total.toLocaleString()}*\n\n`;
            msg += "📍 *ที่อยู่จัดส่ง:* (ลูกค้าพิมพ์แจ้งที่นี่)";

            // --- เปลี่ยนไอดีไลน์ลูกค้าที่นี่ ---
            const lineID = "@YOUR_LINE_ID"; 
            window.location.href = `https://line.me/R/oaMessage/${lineID}/?${encodeURIComponent(msg)}`;
            
            // ล้างตะกร้าหลังสั่งเสร็จ
            cart = [];
            save();
            updateUI();
        }

        renderStore();
    </script>
</body>
</html>
